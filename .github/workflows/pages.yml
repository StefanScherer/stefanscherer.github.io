name: Deploy Hugo + Legacy to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Build Hugo site
        run: hugo --source hugo --destination ../.hugo-public --minify

      - name: Assemble legacy + Hugo output
        run: |
          mkdir -p .site
          rsync -a ./ .site/ \
            --exclude .git/ \
            --exclude .github/ \
            --exclude hugo/ \
            --exclude .site/ \
            --exclude .hugo-public/
          mkdir -p .site/legacy
          test -f ./index.html && cp ./index.html .site/legacy/index.html || true
          test -f .site/legacy/index.html && perl -0777 -i -pe 's|<head>|<head>\n    <base href="/">| unless /<base href=/' .site/legacy/index.html || true
          test -f ./index.xml && cp ./index.xml .site/legacy/index.xml || true
          rsync -a .hugo-public/ .site/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
